name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release binary
    # Build on Ubuntu 22.04 so Linux artifacts link against glibc 2.35
    # instead of the newer glibc from ubuntu-latest (currently 24.04+).
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install DotSlash
        run: cargo install dotslash --locked

      - name: Build release binary
        run: cargo build -p xai-grok-pager-bin --release --locked --target x86_64-unknown-linux-gnu

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/xai-grok-pager dist/grok-linux-x86_64
          chmod +x dist/grok-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-linux-x86_64
          path: dist/grok-linux-x86_64
          if-no-files-found: error
